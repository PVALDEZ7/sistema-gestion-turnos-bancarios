<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Historial de Turnos | Sistema Bancario</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dashboard-body">

  <div class="dashboard-container">

    <aside class="sidebar">

      <div class="sidebar-logo">
        <h2>Banco Digital</h2>
        <p>Sistema de Turnos</p>
      </div>

      <nav class="sidebar-menu">
        <a href="dashboard.html">Inicio</a>
        <a href="generar-turno.html">Generar turno</a>
        <a href="cola-espera.html">Cola de espera</a>
        <a href="asesor.html">Atención</a>
        <a href="historial.html" class="active">Historial</a>
        <a href="reportes.html">Reportes</a>
      </nav>

      <button id="cerrarSesion" class="logout-button">
        Cerrar sesión
      </button>

    </aside>

    <main class="dashboard-main">

      <header class="dashboard-header">
        <div>
          <h1>Historial de turnos</h1>
          <p>Consulte los turnos registrados en el sistema</p>
        </div>
      </header>

      <section class="filtros-card">

        <div class="filtro-grupo">

          <label for="buscarTurno">
            Buscar turno
          </label>

          <input
            type="text"
            id="buscarTurno"
            placeholder="Ejemplo: B-001"
          >

        </div>

        <div class="filtro-grupo">

          <label for="filtroEstado">
            Estado
          </label>

          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En atención">En atención</option>
            <option value="Atendido">Atendido</option>
            <option value="Cancelado">Cancelado</option>
          </select>

        </div>

        <div class="filtro-grupo">

          <label for="filtroServicio">
            Tipo de atención
          </label>

          <select id="filtroServicio">
            <option value="">Todos</option>
            <option value="Consultas">Consultas</option>
            <option value="Depósitos">Depósitos</option>
            <option value="Retiros">Retiros</option>
            <option value="Pago de servicios">Pago de servicios</option>
            <option value="Atención al cliente">Atención al cliente</option>
          </select>

        </div>

        <button id="limpiarFiltros" class="btn-limpiar">
          Limpiar filtros
        </button>

      </section>

      <section class="tabla-card">

        <div class="tabla-header">

          <h2>Turnos registrados</h2>

          <span id="cantidadHistorial">
            0 registros
          </span>

        </div>

        <div class="tabla-responsive">

          <table>

            <thead>
              <tr>
                <th>Número</th>
                <th>Servicio</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Asesor</th>
                <th>Estado</th>
              </tr>
            </thead>

            <tbody id="tablaHistorial">

              <tr>
                <td colspan="6">
                  No existen turnos registrados
                </td>
              </tr>

            </tbody>

          </table>

        </div>

      </section>

    </main>

  </div>

  <script src="js/historial.js"></script>

</body>
</html>
