<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Generar Turno | Sistema Bancario</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dashboard-body">

  <div class="dashboard-container">

    <aside class="sidebar">

      <div class="sidebar-logo">
        <h2>Banco Digital</h2>
        <p>Sistema de Turnos</p>
      </div>

      <nav class="sidebar-menu">
        <a href="dashboard.html">Inicio</a>
        <a href="generar-turno.html" class="active">Generar turno</a>
        <a href="cola-espera.html">Cola de espera</a>
        <a href="asesor.html">Atención</a>
        <a href="historial.html">Historial</a>
        <a href="reportes.html">Reportes</a>
      </nav>

      <button id="cerrarSesion" class="logout-button">
        Cerrar sesión
      </button>

    </aside>

    <main class="dashboard-main">

      <header class="dashboard-header">
        <div>
          <h1>Generar nuevo turno</h1>
          <p>Seleccione el tipo de atención bancaria</p>
        </div>
      </header>

      <section class="turno-section">

        <div class="turno-form-card">

          <h2>Datos del turno</h2>

          <form id="turnoForm">

            <label for="tipoAtencion">
              Tipo de atención
            </label>

            <select id="tipoAtencion" required>
              <option value="">Seleccione una opción</option>
              <option value="Consultas">Consultas</option>
              <option value="Depósitos">Depósitos</option>
              <option value="Retiros">Retiros</option>
              <option value="Pago de servicios">Pago de servicios</option>
              <option value="Atención al cliente">Atención al cliente</option>
            </select>

            <button type="submit">
              Generar turno
            </button>

          </form>

        </div>

        <div class="ticket-card" id="ticketCard">

          <p>Turno generado</p>

          <h2 id="numeroTurno">
            B-000
          </h2>

          <p id="servicioTurno">
            Seleccione un servicio
          </p>

          <span>
            Espere hasta que su turno sea llamado
          </span>

        </div>

      </section>

    </main>

  </div>

  <script src="js/generar-turno.js"></script>

</body>
</html>
